<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TopBins</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,700&family=Rajdhani:wght@300;500;600;700&family=Inter:wght@400;600;800&family=Anton&display=swap" rel="stylesheet">
    <style>
      :root {
        --neon-red: #FF003C;
        --neon-volt: #CCFF00;
        --deep-black: #050505;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--deep-black);
        color: #eee;
        overflow-x: hidden;
      }
      
      /* Global Noise Texture */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
        opacity: 0.4;
      }

      h1, h2, h3, h4, .display-font {
        font-family: 'Chakra Petch', sans-serif;
      }
      .font-tech {
        font-family: 'Rajdhani', sans-serif;
      }
      .font-poster {
        font-family: 'Anton', sans-serif;
      }

      /* Selection */
      ::selection {
        background-color: var(--neon-volt);
        color: black;
      }
      
      /* Cyber Grid Background */
      .cyber-grid {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      }

      /* Chrome Text Effect */
      .chrome-text {
        background: linear-gradient(to bottom, #fff 0%, #e4e4e7 40%, #a1a1aa 50%, #d1d5db 51%, #ffffff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0px 0px 2px rgba(255,255,255,0.3));
      }
      
      .text-stroke {
        -webkit-text-stroke: 1px rgba(255,255,255,0.2);
        color: transparent;
      }

      /* CRT Scanline Effect */
      .scanlines {
        background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
        background-size: 100% 3px;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #000; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--neon-volt); 
      }
    </style>
  
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
