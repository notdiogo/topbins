name: Update Player Stats

on:
  schedule:
    # Runs daily at 6:00 PM EST (11:00 PM UTC)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome for Selenium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python dependencies
        run: |
          pip install soccerdata seleniumbase pandas requests lxml html5lib supabase

      - name: Fetch latest stats and update constants
        run: python3 scripts/fetch_and_update.py
        env:
          CI: true
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet constants.ts scripts/latest_stats.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add constants.ts scripts/latest_stats.json
          git commit -m "📊 Auto-update stats - $(date +'%Y-%m-%d')"
          git push
